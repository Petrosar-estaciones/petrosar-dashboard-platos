.topbar{background:#fff;border-bottom:1px solid #e0e0d8;padding:14px 24px;display:flex;align-items:center;gap:12px}

.kpi-value{font-size:22px;font-weight:600;color:#1a1a1a}
.kpi-sub{font-size:11px;color:#999;margin-top:3px}
.charts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px}
.chart-card{background:#fff;border-radius:10px;padding:16px;border:1px solid #e8e8e0}
.chart-card.full{grid-column:span 2}
.chart-title{font-size:13px;font-weight:500;color:#666;margin-bottom:12px}
.chart-wrap{position:relative;width:100%}
.h220{height:220px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:8px;font-size:12px;color:#666}
.legend span{display:flex;align-items:center;gap:5px}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.table-card{background:#fff;border-radius:10px;padding:16px;border:1px solid #e8e8e0;margin-bottom:20px;overflow-x:auto}
.section-title{font-size:13px;font-weight:500;color:#666;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:right;padding:7px 10px;color:#888;font-weight:500;border-bottom:1px solid #eee;font-size:12px}
thead th:first-child{text-align:left}
tbody td{text-align:right;padding:7px 10px;color:#222;border-bottom:1px solid #f0f0ea}
tbody td:first-child{text-align:left;color:#555}
tbody tr:last-child td{border-bottom:none;font-weight:600;color:#1a1a1a;background:#fafaf8}
tbody tr:hover td{background:#fafaf8}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}.charts-grid{grid-template-columns:1fr}.chart-card.full{grid-column:span 1}.topbar p{display:none}}

  const labels      = ACTIVE.map(m=>m.charAt(0)+m.slice(1,3).toLowerCase());

  document.getElementById('content').innerHTML = `
  <div class="kpis">
    <div class="kpi"><div class="kpi-label">Total platos vendidos</div><div class="kpi-value">${fmt(totalPlatos)}</div><div class="kpi-sub">${fmt(totalDias)} días trabajados</div></div>
    <div class="kpi"><div class="kpi-label">Facturación neta total</div><div class="kpi-value">${fmtM(totalNeto)}</div><div class="kpi-sub">$${fmt(totalNeto)}</div></div>
    <div class="kpi"><div class="kpi-label">Promedio platos / día</div><div class="kpi-value">${Math.round(promDia*10)/10}</div><div class="kpi-sub">acumulado</div></div>
    <div class="kpi"><div class="kpi-label">Precio prom. por plato</div><div class="kpi-value">$${fmt(precioProm)}</div><div class="kpi-sub">promedio anual</div></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="legend"><span><span class="leg-dot" style="background:${BLUE}"></span>Clientes externos</span><span><span class="leg-dot" style="background:${TEAL}"></span>Petrosar interno</span></div>
      <div class="chart-title">Platos vendidos por mes</div>
      <div class="chart-wrap h220"><canvas id="c1" role="img" aria-label="Platos por mes">Barras apiladas mensuales.</canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Facturación neta por mes ($)</div>
      <div class="chart-wrap h220"><canvas id="c2" role="img" aria-label="Facturación mensual">Barras de facturación mensual.</canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Precio promedio por plato ($)</div>
      <div class="chart-wrap h220"><canvas id="c3" role="img" aria-label="Precio promedio mensual">Línea de precio promedio.</canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Promedio platos / día</div>
      <div class="chart-wrap h220"><canvas id="c4" role="img" aria-label="Promedio diario mensual">Línea de promedio diario.</canvas></div>
    </div>
  </div>

  <div class="table-card">
    <div class="section-title">Resumen mensual comparativo</div>
    <table>
      <thead><tr><th>Mes</th><th>Días</th><th>Platos</th><th>Prom/día</th><th>Máx</th><th>Mín</th><th>Facturación neta</th><th>Precio prom.</th></tr></thead>
      <tbody>
        ${ACTIVE.map(m=>{const r=RESUMEN[m];return`<tr><td>${m.charAt(0)+m.slice(1).toLowerCase()}</td><td>${r.dias}</td><td>${fmt(r.total_platos)}</td><td>${r.prom_platos_dia}</td><td>${r.max_diario}</td><td>${r.min_diario}</td><td>$${fmt(r.neto_total)}</td><td>$${fmt(r.precio_prom_plato)}</td></tr>`;}).join('')}
        <tr><td>TOTAL / PROM.</td><td>${totalDias}</td><td>${fmt(totalPlatos)}</td><td>${Math.round(promDia*10)/10}</td><td>—</td><td>—</td><td>$${fmt(totalNeto)}</td><td>$${fmt(precioProm)}</td></tr>
      </tbody>
    </table>
  </div>`;

  charts.c1 = new Chart(document.getElementById('c1'),{type:'bar',data:{labels,datasets:[{label:'Clientes',data:ACTIVE.map(m=>RESUMEN[m].cli_total_platos),backgroundColor:BLUE,borderRadius:3},{label:'Petrosar',data:ACTIVE.map(m=>RESUMEN[m].pet_total_platos),backgroundColor:TEAL,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,grid:{display:false},ticks:{autoSkip:false}},y:{stacked:true,grid:{color:'rgba(0,0,0,0.06)'},ticks:{callback:v=>fmt(v)}}}}});
  charts.c2 = new Chart(document.getElementById('c2'),{type:'bar',data:{labels,datasets:[{label:'Facturación',data:ACTIVE.map(m=>RESUMEN[m].neto_total),backgroundColor:AMB,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{autoSkip:false}},y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{callback:v=>'$'+Math.round(v/1e6)+'M'}}}}});
  charts.c3 = new Chart(document.getElementById('c3'),{type:'line',data:{labels,datasets:[{label:'Precio prom.',data:ACTIVE.map(m=>RESUMEN[m].precio_prom_plato),borderColor:CORAL,backgroundColor:'rgba(216,90,48,0.07)',tension:0.3,pointRadius:5,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{autoSkip:false}},y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{callback:v=>'$'+fmt(v)}}}}});
  charts.c4 = new Chart(document.getElementById('c4'),{type:'line',data:{labels,datasets:[{label:'Prom/día',data:ACTIVE.map(m=>RESUMEN[m].prom_platos_dia),borderColor:BLUE,backgroundColor:'rgba(55,138,221,0.07)',tension:0.3,pointRadius:5,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{autoSkip:false}},y:{grid:{color:'rgba(0,0,0,0.06)'}}}}});
}

function renderMes(mes){
  const r = RESUMEN[mes];
  const dias = DAILY.filter(d=>d.mes===mes);
  const labels = dias.map(d=>d.fecha.slice(5));
  const barH = Math.max(200, dias.length*36);

  document.getElementById('content').innerHTML = `
  <div class="kpis">
    <div class="kpi"><div class="kpi-label">Total platos</div><div class="kpi-value">${fmt(r.total_platos)}</div><div class="kpi-sub">${r.dias} días trabajados</div></div>
    <div class="kpi"><div class="kpi-label">Facturación neta</div><div class="kpi-value">${fmtM(r.neto_total)}</div><div class="kpi-sub">$${fmt(r.neto_total)}</div></div>
    <div class="kpi"><div class="kpi-label">Prom. platos / día</div><div class="kpi-value">${r.prom_platos_dia}</div><div class="kpi-sub">Máx ${r.max_diario} · Mín ${r.min_diario}</div></div>
    <div class="kpi"><div class="kpi-label">Precio prom. / plato</div><div class="kpi-value">$${fmt(r.precio_prom_plato)}</div><div class="kpi-sub">Prom. neto/día $${fmt(r.prom_neto_dia)}</div></div>
  </div>

  <div class="chart-card" style="margin-bottom:16px">
    <div class="legend">
      <span><span class="leg-dot" style="background:${BLUE}"></span>Clientes externos</span>
      ${r.pet_total_platos>0?`<span><span class="leg-dot" style="background:${TEAL}"></span>Petrosar interno</span>`:''}
    </div>
    <div class="chart-title">Platos por día</div>
    <div class="chart-wrap" style="height:${barH}px"><canvas id="cd1" role="img" aria-label="Platos diarios">Barras horizontales diarias.</canvas></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Facturación neta diaria ($)</div>
      <div class="chart-wrap h220"><canvas id="cd2" role="img" aria-label="Facturación diaria">Barras de facturación.</canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Precio promedio por plato ($)</div>
      <div class="chart-wrap h220"><canvas id="cd3" role="img" aria-label="Precio promedio diario">Línea de precio promedio.</canvas></div>
    </div>
  </div>

  ${r.pet_total_platos>0?`
  <div class="table-card">
    <div class="section-title">Desglose Clientes externos vs. Petrosar interno</div>
    <div class="kpis" style="margin-bottom:0">
      <div class="kpi"><div class="kpi-label">Platos clientes</div><div class="kpi-value">${fmt(r.cli_total_platos)}</div><div class="kpi-sub">$${fmt(r.cli_neto)}</div></div>
      <div class="kpi"><div class="kpi-label">Platos Petrosar</div><div class="kpi-value">${fmt(r.pet_total_platos)}</div><div class="kpi-sub">$${fmt(r.pet_neto)}</div></div>
      <div class="kpi"><div class="kpi-label">Precio prom. clientes</div><div class="kpi-value">$${fmt(r.cli_precio_prom)}</div></div>
      <div class="kpi"><div class="kpi-label">Precio prom. Petrosar</div><div class="kpi-value">$${fmt(r.pet_precio_prom)}</div></div>
    </div>
  </div>`:''}`;

  charts.cd1 = new Chart(document.getElementById('cd1'),{type:'bar',data:{labels,datasets:[{label:'Clientes',data:dias.map(d=>d.cantidad_clientes),backgroundColor:BLUE,borderRadius:2},{label:'Petrosar',data:dias.map(d=>d.cantidad_petrosar),backgroundColor:TEAL,borderRadius:2}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,grid:{color:'rgba(0,0,0,0.06)'}},y:{stacked:true,grid:{display:false},ticks:{font:{size:11}}}}}});
  charts.cd2 = new Chart(document.getElementById('cd2'),{type:'bar',data:{labels,datasets:[{label:'Neto',data:dias.map(d=>d.neto_total),backgroundColor:AMB,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{autoSkip:true,maxTicksLimit:8,maxRotation:45}},y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{callback:v=>'$'+Math.round(v/1e3)+'k'}}}}});
  charts.cd3 = new Chart(document.getElementById('cd3'),{type:'line',data:{labels,datasets:[{label:'Precio prom.',data:dias.map(d=>d.precio_prom),borderColor:CORAL,backgroundColor:'rgba(216,90,48,0.07)',tension:0.3,pointRadius:4,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{autoSkip:true,maxTicksLimit:8,maxRotation:45}},y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{callback:v=>'$'+fmt(v)}}}}});
}

renderTabs();
renderContent();
</script>
